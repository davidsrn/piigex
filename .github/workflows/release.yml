name: Release

on:
  push:
    tags: ["v*"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: python -m pytest -q

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install --upgrade build twine
      - run: python -m build
      - run: python -m twine check dist/*
      - name: Verify wheel contents
        run: |
          python - <<'EOF'
          import glob, sys, zipfile
          whl = glob.glob("dist/*.whl")[0]
          names = zipfile.ZipFile(whl).namelist()
          missing = [f for f in ["LICENSE", "README.md", "py.typed"] if not any(f in n for n in names)]
          if missing:
              print("Missing from wheel:", missing)
              sys.exit(1)
          print("Wheel contents OK:", [n for n in names if any(f in n for f in ["LICENSE", "README", "py.typed"])])
          EOF
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/piigex/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: true
